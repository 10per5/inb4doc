main = "docker"
project = "inb4doc"

[[include]]
path = "editor/predep.toml"

[[include]]
path = "hugo-view/predep.toml"

[[include]]
path = "gui/predep.toml"

[[stages]]
name = "init"
description = "Distribute shared icons from images/ into each subproject's git-ignored asset folder"
type = "copy"
source_dir = "root://images"
fail_if_missing = true
files = [
  { source = "root://images/favicon.ico", dests = [
      "root://editor/public/favicon.ico",
      "root://hugo-view/static/favicon.ico",
  ] },
  { source = "root://images/inb4doc-32.png", dests = [
      "root://editor/static/inb4doc-32.png",
      "root://editor/static/favicon.png",
      "root://gui/bin/icon.png",
  ] },
  { source = "root://images/inb4doc-256.png", dests = [
      "root://editor/static/inb4doc-256.png",
  ] },
  { source = "root://images/inb4doc-64.png", dests = [
      "root://hugo-view/static/favicon.png",
  ] },
]

[[stages]]
name = "build"
description = "Build all subprojects"
type = "group"
depends = [
    "init",
    "editor::build",
    "hugo-view::build",
    "gui::build",
]

[[stages]]
name = "docker"
description = "Build all subprojects via Docker"
type = "group"
depends = [
    "init",
    "editor::docker",
    "hugo-view::docker",
    "gui::docker",
]

[[stages]]
name = "package"
description = "Assemble release archive"
type = "package"
bundle = "inb4doc"
# depends = ["build"]
artifacts = [
    { source = "root://gui/bin/inb4doc-gui", dest = "inb4doc-gui", binary = true },
    { source = "root://images/inb4doc-32.png", dest = "icon.png" },
    { source = "root://editor/public", dest = "editor" },
]

[install]
dir = "/opt/inb4doc"
symlink = true
artifacts = [
  { source = "root://gui/bin/inb4doc-gui", dest = "inb4doc-gui" },
  { source = "root://images/inb4doc-32.png", dest = "icon.png" },
  { source = "root://editor/public/",      dest = "editor" },
  { source = "root://content",            dest = "content" },
]
