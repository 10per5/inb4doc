main = "docker"
project = "inb4doc"

[[include]]
path = "editor/predep.toml"

[[include]]
path = "hugo-view/predep.toml"

[[include]]
path = "gui/predep.toml"

[[stages]]
name = "build"
description = "Build all subprojects"
type = "group"
depends = [
    "editor::build",
    "hugo-view::build",
    "gui::build",
]

[[stages]]
name = "docker"
description = "Build all subprojects via Docker"
type = "group"
depends = [
    "editor::docker",
    "hugo-view::docker",
    "gui::docker",
]

[[stages]]
name = "package"
description = "Assemble release archive"
type = "package"
bundle = "inb4doc"
# depends = ["build"]
artifacts = [
    { source = "root://gui/bin/inb4doc-gui", dest = "inb4doc-gui", binary = true },
    { source = "root://editor/public", dest = "editor" },
]

[install]
dir = "/opt/inb4doc"
symlink = true
artifacts = [
  { source = "root://gui/bin/inb4doc-gui", dest = "inb4doc-gui" },
  { source = "root://editor/public/",      dest = "editor" },
  { source = "root://content",            dest = "content" },
  { source = "root://hugo-view/themes",   dest = "hugo/themes" },
  { source = "root://hugo-view/hugo.toml",dest = "hugo/hugo.toml" },
]
