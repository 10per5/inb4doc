name: Deploy static content to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup

      - uses: ./.github/actions/build-editor
        with:
          live-url-base: /inb4doc
          editor-self-base: https://10per5.github.io/inb4doc/editor-live/
          build-mode: web-remote

      - uses: ./.github/actions/build-hugo
        with:
          baseurl: /inb4doc/
          editor-url: /inb4doc/editor-live
          site-url: https://10per5.github.io/inb4doc

      - name: Copy content images into Hugo output
        shell: bash
        run: predep copy-images

      - name: Copy editor into site output
        shell: bash
        run: |
          mkdir -p hugo-view/build/editor-live
          cp -r editor/public/. hugo-view/build/editor-live

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: hugo-view/build

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
