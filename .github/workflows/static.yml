# Deploy Hugo site to GitHub Pages via predep
name: Deploy static content to Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download predep
        run: |
          curl -sL \
            https://github.com/10per5/predep/releases/download/v0.0.1/predep-linux-x86_64.tar.gz \
            -o /tmp/predep.tar.gz
          tar xzf /tmp/predep.tar.gz -C /usr/local/bin

      - name: Build Hugo site
        working-directory: hugo-view
        env:
          HUGO_BASEURL: /predoc/
        run: predep hugo-build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: hugo-view/build

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
