name: Build editor
description: Install dependencies and build the editor with a configurable live URL base

inputs:
  live-url-base:
    description: Base URL for the live site link in the editor sidebar
    required: false
    default: "/inb4doc"
  editor-self-base:
    description: Base URL path where the editor is deployed (e.g. /inb4doc/editor-live/)
    required: false
    default: ""
  build-mode:
    description: Editor build mode (web-remote, web-local, gui-desktop, gui-mobile)
    required: false
    default: "web-remote"
  site-url:
    description: Absolute site URL used for meta tags / OG image fallbacks
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Cache Bun packages
      uses: actions/cache@v4
      with:
        path: ~/.bun/install/cache
        key: bun-${{ hashFiles('editor/bun.lock', 'editor/package.json', '.github/actions/build-editor/action.yml') }}
        restore-keys: |
          bun-

    - name: Setup Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: latest

    - name: Build editor
      working-directory: editor
      shell: bash
      env:
        BUILD_MODE: ${{ inputs.build-mode }}
        LIVE_URL_BASE: ${{ inputs.live-url-base }}
        EDITOR_SELF_BASE: ${{ inputs.editor-self-base }}
        SITE_URL: ${{ inputs.site-url }}
      run: |
        bun install --frozen-lockfile
        bun run build
