name: Build Hugo site
description: Build the Hugo SSG static site

inputs:
  baseurl:
    description: Hugo baseURL override
    required: false
    default: ""
  editor-url:
    description: Editor URL to inject into the Hugo output menu
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Load PREDEP SHA
      id: predep-sha
      shell: bash
      run: |
        echo "sha=$(sed -n 's/^hugo: //p' .github/predep-shas.yml)" >> $GITHUB_OUTPUT

    - name: Cache Hugo binary
      uses: actions/cache@v4
      with:
        path: ~/.cache/predep
        key: hugo-binary-${{ hashFiles('hugo-view/predep.toml', '.github/predep-shas.yml') }}

    - name: Hugo binary
      working-directory: hugo-view
      shell: bash
      run: predep --privileged ${{ steps.predep-sha.outputs.sha }} hugo-binary

    - name: Cache Hugo theme
      uses: actions/cache@v4
      with:
        path: hugo-view/themes
        key: hugo-theme-${{ hashFiles('hugo-view/predep.toml', '.github/predep-shas.yml') }}

    - name: Hugo theme
      working-directory: hugo-view
      shell: bash
      run: predep --privileged ${{ steps.predep-sha.outputs.sha }} hugo-theme

    - name: Cache Hugo resources
      uses: actions/cache@v4
      with:
        path: hugo-view/resources
        key: hugo-resources-${{ hashFiles('hugo-view/predep.toml', '.github/predep-shas.yml', 'hugo-view/hugo.toml', 'hugo-view/layouts/**', 'content/**', '.github/actions/build-hugo/action.yml') }}

    - name: Build Hugo site
      working-directory: hugo-view
      shell: bash
      env:
        HUGO_BASEURL: ${{ inputs.baseurl }}
        EDITOR_URL: ${{ inputs.editor-url }}
      run: predep --privileged ${{ steps.predep-sha.outputs.sha }} build
